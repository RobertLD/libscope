version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    target-branch: "development"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/sdk/go"
    target-branch: "development"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
