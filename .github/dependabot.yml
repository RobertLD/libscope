version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "pip"
    directory: "/sdk-python"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/sdk-go"
    schedule:
      interval: "weekly"
