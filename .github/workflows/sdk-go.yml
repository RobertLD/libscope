name: Go SDK
on:
  push:
    paths: ["sdk/go/**"]
  pull_request:
    paths: ["sdk/go/**"]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: cd sdk/go && go test ./... -v
      - run: cd sdk/go && go vet ./...
