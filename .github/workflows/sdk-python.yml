name: Python SDK
on:
  push:
    paths: ['sdk-python/**']
  pull_request:
    paths: ['sdk-python/**']
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: cd sdk-python && pip install -e ".[dev]" && pytest -v
