# SonarQube / SonarCloud project configuration
# Set SONAR_HOST_URL and SONAR_TOKEN as environment variables (never commit the token).

sonar.projectKey=RobertLD_libscope
sonar.projectName=libscope
sonar.projectVersion=1.3.0
sonar.organization=robertld

sonar.sources=src,packages/parsers/src
sonar.tests=tests,packages/parsers/tests
sonar.exclusions=node_modules/**,dist/**,coverage/**,docs/**,sdk/**,packages/parsers/dist/**
# Exclude parsers source from CPD: files were relocated from src/core/parsers/ with only
# ValidationError→ParseError changed. Sonar's baseline still has the originals indexed,
# so without this exclusion every source file would be flagged as a duplicate.
sonar.cpd.exclusions=packages/parsers/src/**
# Exclude parsers tests from analysis: the test file was moved from tests/unit/parsers.test.ts
# and Sonar's Automatic Analysis does not apply sonar.cpd.exclusions to test files.
# Without this exclusion the file is flagged as duplicating the deleted baseline copy.
sonar.test.exclusions=packages/parsers/tests/**

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
