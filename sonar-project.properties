# SonarQube / SonarCloud project configuration
# Set SONAR_HOST_URL and SONAR_TOKEN as environment variables (never commit the token).

sonar.projectKey=RobertLD_libscope
sonar.projectName=libscope
sonar.projectVersion=1.3.0
sonar.organization=robertld

sonar.sources=src
sonar.tests=tests
sonar.exclusions=node_modules/**,dist/**,coverage/**,docs/**,sdk/**
# packages/parsers is a standalone npm workspace package. It is excluded from the root
# project's Sonar scope intentionally: its source files were relocated from src/core/parsers/
# with only ValidationError→ParseError changed, so Sonar's baseline would flag every file
# as a duplicate of its deleted original during this PR. Once the package is established,
# it should get its own Sonar project configuration.

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
