# SonarQube / SonarCloud project configuration
# Set SONAR_HOST_URL and SONAR_TOKEN as environment variables (never commit the token).

sonar.projectKey=RobertLD_libscope
sonar.projectName=libscope
sonar.projectVersion=1.3.0
sonar.organization=robertld

sonar.sources=src,packages/parsers/src
sonar.tests=tests,packages/parsers/tests
sonar.exclusions=node_modules/**,dist/**,coverage/**,docs/**,sdk/**,packages/parsers/dist/**
# Exclude parsers package from copy-paste detection: source files were intentionally
# relocated from src/core/parsers/ (only change: ValidationError → ParseError).
# Sonar's baseline still has the originals, so CPD would flag every file as a duplicate.
sonar.cpd.exclusions=packages/parsers/**

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
