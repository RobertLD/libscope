# SonarQube / SonarCloud project configuration
# Set SONAR_HOST_URL and SONAR_TOKEN as environment variables (never commit the token).

sonar.projectKey=RobertLD_libscope
sonar.projectName=libscope
sonar.projectVersion=1.3.0
sonar.organization=robertld

sonar.sources=src,packages/parsers/src
sonar.tests=tests
sonar.exclusions=node_modules/**,dist/**,coverage/**,docs/**,sdk/**,packages/parsers/dist/**,packages/parsers/tests/**
# parsers source files relocated from src/core/parsers/ (only change: ValidationError→ParseError).
# Exclude from CPD so Sonar's baseline copy of the originals doesn't trigger duplication flags.
sonar.cpd.exclusions=packages/parsers/src/**

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
